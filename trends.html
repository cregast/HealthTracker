<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Vitals" />
  <meta name="theme-color" content="#0a0f1e" />
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="icons/icon-192.png" />
  <title>Vitals — Trends</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Syne:wght@400;700;800&display=swap');

    :root {
      --bg:       #0a0f1e;
      --surface:  #111827;
      --border:   #1e2d45;
      --accent:   #3b82f6;
      --accent2:  #06b6d4;
      --accent3:  #8b5cf6;
      --text:     #e2e8f0;
      --muted:    #64748b;
      --success:  #10b981;
      --warn:     #f59e0b;
      --radius:   16px;

      /* chart line colors */
      --c-sys:    #ef4444;
      --c-dia:    #f97316;
      --c-hr:     #06b6d4;
      --c-wt:     #10b981;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html { scroll-behavior: smooth; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Mono', monospace;
      -webkit-font-smoothing: antialiased;
      min-height: 100dvh;
      padding-bottom: calc(env(safe-area-inset-bottom, 0px) + 80px);
      background-image:
        radial-gradient(ellipse 80% 40% at 50% -5%, rgba(59,130,246,0.12) 0%, transparent 55%),
        radial-gradient(ellipse 50% 30% at 90% 100%, rgba(139,92,246,0.07) 0%, transparent 50%);
    }

    /* ── TOP NAV ── */
    .topbar {
      position: sticky;
      top: 0;
      z-index: 50;
      background: rgba(10,15,30,0.85);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
      padding: env(safe-area-inset-top, 16px) 20px 0;
    }

    .topbar-inner {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding-bottom: 12px;
      max-width: 480px;
      margin: 0 auto;
    }

    .topbar h1 {
      font-family: 'Syne', sans-serif;
      font-size: 20px;
      font-weight: 800;
      letter-spacing: -0.3px;
      background: linear-gradient(135deg, #e2e8f0 0%, #94a3b8 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .topbar-actions {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .nav-link {
      font-size: 12px;
      color: var(--muted);
      text-decoration: none;
      letter-spacing: 0.06em;
      padding: 6px 12px;
      border: 1px solid var(--border);
      border-radius: 100px;
      transition: color 0.15s, border-color 0.15s;
      white-space: nowrap;
    }
    .nav-link:hover { color: var(--text); border-color: var(--accent); }

    .nav-link.sheet-link {
      padding: 5px 9px;
      font-size: 15px;
      line-height: 1;
      display: flex;
      align-items: center;
    }

    /* ── RANGE PILLS ── */
    .range-bar {
      max-width: 480px;
      margin: 0 auto;
      padding: 14px 20px;
      display: flex;
      gap: 8px;
    }

    .range-pill {
      flex: 1;
      text-align: center;
      padding: 7px 4px;
      border-radius: 100px;
      border: 1px solid var(--border);
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      font-weight: 500;
      color: var(--muted);
      cursor: pointer;
      background: transparent;
      transition: all 0.15s;
      letter-spacing: 0.05em;
    }

    .range-pill.active {
      background: rgba(59,130,246,0.15);
      border-color: var(--accent);
      color: var(--accent);
    }

    /* ── CONTENT ── */
    .content {
      max-width: 480px;
      margin: 0 auto;
      padding: 0 16px;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    /* ── STAT CHIPS ── */
    .stats-row {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 10px;
    }

    .stat-chip {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 14px 16px;
      display: flex;
      flex-direction: column;
      gap: 4px;
      animation: fadeUp 0.4s ease both;
    }

    .stat-chip:nth-child(1) { animation-delay: 0.05s; }
    .stat-chip:nth-child(2) { animation-delay: 0.10s; }
    .stat-chip:nth-child(3) { animation-delay: 0.15s; }
    .stat-chip:nth-child(4) { animation-delay: 0.20s; }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .stat-label {
      font-size: 9px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.1em;
    }

    .stat-value {
      font-family: 'Syne', sans-serif;
      font-size: 22px;
      font-weight: 800;
      line-height: 1;
      letter-spacing: -0.5px;
    }

    .stat-sub {
      font-size: 10px;
      color: var(--muted);
    }

    .chip-bp   .stat-value { color: var(--c-sys); }
    .chip-hr   .stat-value { color: var(--c-hr); }
    .chip-wt   .stat-value { color: var(--c-wt); }
    .chip-avg  .stat-value { color: var(--warn); }

    /* ── CHART CARDS ── */
    .chart-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 20px 16px 16px;
      animation: fadeUp 0.5s ease both;
    }

    .chart-card:nth-of-type(1) { animation-delay: 0.1s; }
    .chart-card:nth-of-type(2) { animation-delay: 0.2s; }
    .chart-card:nth-of-type(3) { animation-delay: 0.3s; }

    .chart-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
    }

    .chart-title {
      font-family: 'Syne', sans-serif;
      font-size: 14px;
      font-weight: 700;
      letter-spacing: 0.02em;
    }

    .chart-legend {
      display: flex;
      gap: 10px;
    }

    .legend-item {
      display: flex;
      align-items: center;
      gap: 5px;
      font-size: 10px;
      color: var(--muted);
    }

    .legend-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .chart-wrap {
      position: relative;
      height: 160px;
    }

    /* ── LOADING / EMPTY ── */
    .state-view {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
      padding: 60px 20px;
      color: var(--muted);
    }

    .state-icon {
      font-size: 32px;
      opacity: 0.5;
    }

    .state-msg {
      font-size: 13px;
      text-align: center;
      line-height: 1.6;
    }

    .pulse {
      animation: pulse 1.4s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 0.4; }
      50%       { opacity: 1; }
    }

    /* ── REFRESH BTN ── */
    .refresh-btn {
      display: flex;
      align-items: center;
      gap: 6px;
      margin: 0 auto;
      padding: 9px 18px;
      border: 1px solid var(--border);
      border-radius: 100px;
      background: transparent;
      color: var(--muted);
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      cursor: pointer;
      transition: color 0.15s, border-color 0.15s;
    }

    .refresh-btn:hover { color: var(--text); border-color: var(--accent2); }

    .refresh-icon { transition: transform 0.5s ease; }
    .refresh-btn.spinning .refresh-icon { transform: rotate(360deg); }

    /* ── BOTTOM NAV ── */
    .bottom-nav {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      z-index: 50;
      background: rgba(10,15,30,0.92);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border-top: 1px solid var(--border);
      padding: 10px 0 calc(env(safe-area-inset-bottom, 0px) + 10px);
      display: flex;
      justify-content: center;
      gap: 0;
    }

    .nav-tab {
      flex: 1;
      max-width: 180px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 3px;
      padding: 6px 0;
      text-decoration: none;
      color: var(--muted);
      font-size: 10px;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      transition: color 0.15s;
      -webkit-tap-highlight-color: transparent;
    }

    .nav-tab svg { opacity: 0.5; transition: opacity 0.15s; }
    .nav-tab.active { color: var(--accent); }
    .nav-tab.active svg { opacity: 1; }

    /* ── SKELETON ── */
    .skeleton {
      border-radius: 8px;
      background: linear-gradient(90deg, var(--border) 25%, rgba(30,45,69,0.7) 50%, var(--border) 75%);
      background-size: 200% 100%;
      animation: shimmer 1.5s infinite;
    }

    @keyframes shimmer {
      0%   { background-position: 200% 0; }
      100% { background-position: -200% 0; }
    }
  </style>
</head>
<body>

<!-- TOP BAR -->
<div class="topbar">
  <div class="topbar-inner">
    <h1>Trends</h1>
    <div class="topbar-actions">
      <a href="https://docs.google.com/spreadsheets/d/1536buiSbUQYK7VnIYwQt3byAQsHhR8j2qvco5OFKwhg/edit?usp=sharing"
         target="_blank" rel="noopener" class="nav-link sheet-link" title="Open source sheet">&#x1F4CA;</a>
      <a href="index.html" class="nav-link">＋ Log Entry</a>
    </div>
  </div>
</div>

<!-- RANGE FILTER -->
<div class="range-bar">
  <button class="range-pill" data-days="7">7d</button>
  <button class="range-pill" data-days="30">30d</button>
  <button class="range-pill active" data-days="90">90d</button>
  <button class="range-pill" data-days="0">All</button>
</div>

<!-- MAIN CONTENT -->
<div class="content" id="content">
  <!-- Populated by JS -->
  <div class="state-view">
    <div class="state-icon pulse">⏳</div>
    <div class="state-msg">Loading your data…</div>
  </div>
</div>

<!-- BOTTOM NAV -->
<nav class="bottom-nav">
  <a href="index.html" class="nav-tab">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/>
    </svg>
    Log
  </a>
  <a href="trends.html" class="nav-tab active">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/>
    </svg>
    Trends
  </a>
</nav>

<script>
// ── CONFIG ──────────────────────────────────────────────────────────────────
const SHEET_ID = '1536buiSbUQYK7VnIYwQt3byAQsHhR8j2qvco5OFKwhg';
// ────────────────────────────────────────────────────────────────────────────

let allRows   = [];
let activeDays = 90;
let charts    = {};

// ── CHART.JS GLOBAL DEFAULTS ────────────────────────────────────────────────
Chart.defaults.color = '#64748b';
Chart.defaults.borderColor = '#1e2d45';
Chart.defaults.font.family = "'DM Mono', monospace";
Chart.defaults.font.size = 10;

// ── FETCH DATA ───────────────────────────────────────────────────────────────
async function fetchData() {
  // Google Sheets public JSON export — works for "anyone with link can view"
  const url = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&sheet=Sheet1`;
  const res  = await fetch(url);
  const text = await res.text();
  // GViz response is wrapped in a callback: google.visualization.Query.setResponse({...})
  const json = JSON.parse(text.match(/google\.visualization\.Query\.setResponse\(([\s\S]*)\)/)[1]);
  return parseGViz(json);
}

function parseGViz(json) {
  const cols = json.table.cols.map(c => c.label.toLowerCase().trim());
  const rows = json.table.rows || [];

  return rows.map(r => {
    const vals = r.c;
    const obj  = {};
    cols.forEach((col, i) => { obj[col] = vals[i]?.v ?? null; });
    return obj;
  }).map(obj => {
    // Parse date — GViz returns date strings or Date(...) literals
    let date;
    const rawDate = obj['date'] || obj[''];
    if (typeof rawDate === 'string') {
      // GViz sometimes returns "Date(2026,5,6,9,32,0)" format
      const dm = rawDate.match(/Date\((\d+),(\d+),(\d+)(?:,(\d+),(\d+),(\d+))?\)/);
      if (dm) {
        date = new Date(+dm[1], +dm[2], +dm[3], +(dm[4]||0), +(dm[5]||0), +(dm[6]||0));
      } else {
        date = new Date(rawDate);
      }
    } else if (typeof rawDate === 'number') {
      date = new Date(rawDate);
    } else {
      date = null;
    }

    // Column names from your sheet headers
    const findCol = (...keys) => {
      for (const k of keys) {
        for (const col of Object.keys(obj)) {
          if (col.includes(k)) return obj[col];
        }
      }
      return null;
    };

    return {
      date,
      sys:    Number(findCol('systolic','sys')),
      dia:    Number(findCol('diastolic','dia')),
      hr:     Number(findCol('heart','hr')),
      weight: Number(findCol('weight','wt')),
    };
  }).filter(r => r.date && !isNaN(r.date.getTime()) && r.sys)
    .sort((a, b) => a.date - b.date);
}

// ── FILTER BY RANGE ──────────────────────────────────────────────────────────
function filterRows(rows, days) {
  if (!days) return rows;
  const cutoff = new Date();
  cutoff.setDate(cutoff.getDate() - days);
  return rows.filter(r => r.date >= cutoff);
}

// ── STATS ────────────────────────────────────────────────────────────────────
function avg(arr) {
  if (!arr.length) return null;
  return arr.reduce((s, v) => s + v, 0) / arr.length;
}

function fmt(val, decimals = 0) {
  if (val === null || isNaN(val)) return '—';
  return val.toFixed(decimals);
}

// ── DATE LABELS ──────────────────────────────────────────────────────────────
function dateLabel(d) {
  return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
}

// ── RENDER ───────────────────────────────────────────────────────────────────
function render(rows) {
  const filtered = filterRows(rows, activeDays);
  const content  = document.getElementById('content');

  if (!filtered.length) {
    content.innerHTML = `
      <div class="state-view">
        <div class="state-icon">📭</div>
        <div class="state-msg">No entries in this range.<br>Log some vitals to see trends.</div>
      </div>`;
    return;
  }

  const labels = filtered.map(r => dateLabel(r.date));
  const latest = filtered[filtered.length - 1];

  const avgSys = avg(filtered.map(r => r.sys));
  const avgDia = avg(filtered.map(r => r.dia));
  const avgHr  = avg(filtered.map(r => r.hr));
  const avgWt  = avg(filtered.map(r => r.weight));

  // Destroy existing charts
  Object.values(charts).forEach(c => c.destroy());
  charts = {};

  content.innerHTML = `
    <!-- STAT CHIPS -->
    <div class="stats-row">
      <div class="stat-chip chip-bp">
        <div class="stat-label">Latest BP</div>
        <div class="stat-value">${fmt(latest.sys)}/${fmt(latest.dia)}</div>
        <div class="stat-sub">avg ${fmt(avgSys)}/${fmt(avgDia)}</div>
      </div>
      <div class="stat-chip chip-hr">
        <div class="stat-label">Latest HR</div>
        <div class="stat-value">${fmt(latest.hr)}</div>
        <div class="stat-sub">avg ${fmt(avgHr)} bpm</div>
      </div>
      <div class="stat-chip chip-wt">
        <div class="stat-label">Latest Weight</div>
        <div class="stat-value">${fmt(latest.weight, 1)}</div>
        <div class="stat-sub">avg ${fmt(avgWt, 1)} lbs</div>
      </div>
      <div class="stat-chip chip-avg">
        <div class="stat-label">Entries</div>
        <div class="stat-value">${filtered.length}</div>
        <div class="stat-sub">${activeDays ? `last ${activeDays}d` : 'all time'}</div>
      </div>
    </div>

    <!-- BP CHART -->
    <div class="chart-card">
      <div class="chart-header">
        <div class="chart-title">Blood Pressure</div>
        <div class="chart-legend">
          <div class="legend-item">
            <div class="legend-dot" style="background:var(--c-sys)"></div>SYS
          </div>
          <div class="legend-item">
            <div class="legend-dot" style="background:var(--c-dia)"></div>DIA
          </div>
        </div>
      </div>
      <div class="chart-wrap"><canvas id="chart-bp"></canvas></div>
    </div>

    <!-- HR CHART -->
    <div class="chart-card">
      <div class="chart-header">
        <div class="chart-title">Heart Rate</div>
        <div class="chart-legend">
          <div class="legend-item">
            <div class="legend-dot" style="background:var(--c-hr)"></div>bpm
          </div>
        </div>
      </div>
      <div class="chart-wrap"><canvas id="chart-hr"></canvas></div>
    </div>

    <!-- WEIGHT CHART -->
    <div class="chart-card">
      <div class="chart-header">
        <div class="chart-title">Weight</div>
        <div class="chart-legend">
          <div class="legend-item">
            <div class="legend-dot" style="background:var(--c-wt)"></div>lbs
          </div>
        </div>
      </div>
      <div class="chart-wrap"><canvas id="chart-wt"></canvas></div>
    </div>

    <!-- REFRESH -->
    <button class="refresh-btn" id="refresh-btn" onclick="doRefresh()">
      <span class="refresh-icon" id="refresh-icon">↻</span> Refresh data
    </button>
  `;

  const commonOpts = (yLabel) => ({
    responsive: true,
    maintainAspectRatio: false,
    interaction: { mode: 'index', intersect: false },
    plugins: {
      legend: { display: false },
      tooltip: {
        backgroundColor: '#111827',
        borderColor: '#1e2d45',
        borderWidth: 1,
        titleColor: '#94a3b8',
        bodyColor: '#e2e8f0',
        padding: 10,
        displayColors: true,
        boxWidth: 8,
        boxHeight: 8,
      },
    },
    scales: {
      x: {
        grid: { color: 'rgba(30,45,69,0.6)', drawTicks: false },
        ticks: {
          maxTicksLimit: 6,
          maxRotation: 0,
          color: '#64748b',
        },
        border: { display: false },
      },
      y: {
        grid: { color: 'rgba(30,45,69,0.6)', drawTicks: false },
        ticks: { color: '#64748b', padding: 6 },
        border: { display: false },
        title: { display: false },
      },
    },
    elements: {
      point: {
        radius: filtered.length > 30 ? 2 : 4,
        hoverRadius: 6,
        borderWidth: 2,
      },
      line: { tension: 0.35, borderWidth: 2 },
    },
  });

  const makeGradient = (ctx, colorHex) => {
    const g = ctx.createLinearGradient(0, 0, 0, 160);
    g.addColorStop(0, colorHex + '33');
    g.addColorStop(1, colorHex + '00');
    return g;
  };

  // BP Chart
  const bpCtx = document.getElementById('chart-bp').getContext('2d');
  charts.bp = new Chart(bpCtx, {
    type: 'line',
    data: {
      labels,
      datasets: [
        {
          label: 'Systolic',
          data: filtered.map(r => r.sys),
          borderColor: '#ef4444',
          backgroundColor: makeGradient(bpCtx, '#ef4444'),
          fill: true,
          pointBackgroundColor: '#ef4444',
        },
        {
          label: 'Diastolic',
          data: filtered.map(r => r.dia),
          borderColor: '#f97316',
          backgroundColor: makeGradient(bpCtx, '#f97316'),
          fill: true,
          pointBackgroundColor: '#f97316',
        },
      ],
    },
    options: {
      ...commonOpts('mmHg'),
      // Add reference lines for normal BP
      plugins: {
        ...commonOpts().plugins,
        annotation: undefined, // skip annotation plugin to keep deps minimal
      },
    },
  });

  // HR Chart
  const hrCtx = document.getElementById('chart-hr').getContext('2d');
  charts.hr = new Chart(hrCtx, {
    type: 'line',
    data: {
      labels,
      datasets: [{
        label: 'Heart Rate',
        data: filtered.map(r => r.hr),
        borderColor: '#06b6d4',
        backgroundColor: makeGradient(hrCtx, '#06b6d4'),
        fill: true,
        pointBackgroundColor: '#06b6d4',
      }],
    },
    options: commonOpts('bpm'),
  });

  // Weight Chart
  const wtCtx = document.getElementById('chart-wt').getContext('2d');
  charts.wt = new Chart(wtCtx, {
    type: 'line',
    data: {
      labels,
      datasets: [{
        label: 'Weight',
        data: filtered.map(r => r.weight),
        borderColor: '#10b981',
        backgroundColor: makeGradient(wtCtx, '#10b981'),
        fill: true,
        pointBackgroundColor: '#10b981',
      }],
    },
    options: commonOpts('lbs'),
  });
}

// ── REFRESH ──────────────────────────────────────────────────────────────────
async function doRefresh() {
  const btn  = document.getElementById('refresh-btn');
  const icon = document.getElementById('refresh-icon');
  if (!btn) return;
  btn.disabled = true;
  icon.style.transition = 'transform 0.5s ease';
  icon.style.transform  = 'rotate(360deg)';
  setTimeout(() => { icon.style.transition = ''; icon.style.transform = ''; }, 500);

  try {
    allRows = await fetchData();
    render(allRows);
  } catch (e) {
    console.error(e);
  } finally {
    if (btn) btn.disabled = false;
  }
}

// ── RANGE PILLS ──────────────────────────────────────────────────────────────
document.querySelectorAll('.range-pill').forEach(pill => {
  pill.addEventListener('click', () => {
    document.querySelectorAll('.range-pill').forEach(p => p.classList.remove('active'));
    pill.classList.add('active');
    activeDays = Number(pill.dataset.days);
    render(allRows);
  });
});

// ── INIT ─────────────────────────────────────────────────────────────────────
(async () => {
  try {
    allRows = await fetchData();
    render(allRows);
  } catch (err) {
    console.error(err);
    document.getElementById('content').innerHTML = `
      <div class="state-view">
        <div class="state-icon">⚠️</div>
        <div class="state-msg">
          Couldn't load data.<br>
          Make sure your sheet is set to<br>"Anyone with link can view."<br><br>
          <small style="opacity:0.5">${err.message}</small>
        </div>
      </div>`;
  }
})();

// Register service worker
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js').catch(() => {});
}
</script>
</body>
</html>
