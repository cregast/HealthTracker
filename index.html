<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Vitals" />
  <meta name="theme-color" content="#0a0f1e" />
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="icons/icon-192.png" />
  <title>Vitals</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Syne:wght@400;700;800&display=swap');

    :root {
      --bg:        #0a0f1e;
      --surface:   #111827;
      --border:    #1e2d45;
      --accent:    #3b82f6;
      --accent2:   #06b6d4;
      --text:      #e2e8f0;
      --muted:     #64748b;
      --success:   #10b981;
      --error:     #ef4444;
      --radius:    16px;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Mono', monospace;
      -webkit-font-smoothing: antialiased;
      overscroll-behavior: none;
    }

    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100dvh;
      padding: env(safe-area-inset-top, 20px) 24px calc(env(safe-area-inset-bottom, 0px) + 74px);
      background-image:
        radial-gradient(ellipse 80% 50% at 50% -10%, rgba(59,130,246,0.15) 0%, transparent 60%),
        radial-gradient(ellipse 60% 40% at 80% 110%, rgba(6,182,212,0.08) 0%, transparent 60%);
    }

    .card {
      width: 100%;
      max-width: 380px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 32px 28px 28px;
      box-shadow: 0 0 0 1px rgba(255,255,255,0.03),
                  0 24px 48px rgba(0,0,0,0.4);
    }

    .header {
      margin-bottom: 32px;
    }

    .header h1 {
      font-family: 'Syne', sans-serif;
      font-size: 28px;
      font-weight: 800;
      letter-spacing: -0.5px;
      line-height: 1;
      background: linear-gradient(135deg, #e2e8f0 0%, #94a3b8 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .header .subtitle {
      font-size: 11px;
      color: var(--muted);
      margin-top: 6px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .fields {
      display: flex;
      flex-direction: column;
      gap: 14px;
      margin-bottom: 28px;
    }

    .field {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .field label {
      font-size: 10px;
      font-weight: 500;
      color: var(--muted);
      letter-spacing: 0.1em;
      text-transform: uppercase;
      padding-left: 2px;
    }

    .field-hint {
      font-size: 9px;
      color: var(--muted);
      opacity: 0.6;
      padding-left: 2px;
    }

    .input-wrap {
      position: relative;
    }

    .input-wrap .icon {
      position: absolute;
      left: 14px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 16px;
      pointer-events: none;
      opacity: 0.5;
    }

    input {
      width: 100%;
      background: rgba(255,255,255,0.04);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text);
      font-family: 'DM Mono', monospace;
      font-size: 18px;
      font-weight: 400;
      padding: 14px 16px 14px 44px;
      outline: none;
      transition: border-color 0.2s, background 0.2s, box-shadow 0.2s;
      -webkit-appearance: none;
      appearance: none;
    }

    input::placeholder {
      color: var(--muted);
      opacity: 0.5;
      font-size: 16px;
    }

    input:focus {
      border-color: var(--accent);
      background: rgba(59,130,246,0.06);
      box-shadow: 0 0 0 3px rgba(59,130,246,0.12);
    }

    input.error {
      border-color: var(--error);
      box-shadow: 0 0 0 3px rgba(239,68,68,0.12);
    }

    .divider {
      height: 1px;
      background: var(--border);
      margin: 4px 0;
    }

    button {
      width: 100%;
      padding: 16px;
      border: none;
      border-radius: var(--radius);
      background: linear-gradient(135deg, var(--accent) 0%, var(--accent2) 100%);
      color: #fff;
      font-family: 'Syne', sans-serif;
      font-size: 15px;
      font-weight: 700;
      letter-spacing: 0.04em;
      cursor: pointer;
      transition: opacity 0.15s, transform 0.1s, box-shadow 0.15s;
      box-shadow: 0 4px 20px rgba(59,130,246,0.3);
      -webkit-tap-highlight-color: transparent;
      position: relative;
      overflow: hidden;
    }

    button:active {
      transform: scale(0.98);
      opacity: 0.9;
    }

    button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      transform: none;
    }

    .btn-text { display: block; }
    .btn-spinner { display: none; }

    button.loading .btn-text { display: none; }
    button.loading .btn-spinner { display: block; }

    .spinner {
      width: 18px;
      height: 18px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      margin: 0 auto;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .toast {
      position: fixed;
      bottom: calc(env(safe-area-inset-bottom, 0px) + 28px);
      left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 100px;
      padding: 12px 20px;
      font-size: 13px;
      font-weight: 500;
      white-space: nowrap;
      transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1), opacity 0.3s;
      opacity: 0;
      z-index: 100;
      box-shadow: 0 8px 32px rgba(0,0,0,0.4);
    }

    .toast.show {
      transform: translateX(-50%) translateY(0);
      opacity: 1;
    }

    .toast.success { border-color: var(--success); color: var(--success); }
    .toast.error-toast { border-color: var(--error); color: var(--error); }

    .last-saved {
      text-align: center;
      font-size: 10px;
      color: var(--muted);
      margin-top: 16px;
      letter-spacing: 0.06em;
      min-height: 14px;
    }

    .field-error {
      font-size: 10px;
      color: var(--error);
      padding-left: 2px;
      display: none;
    }

    .field-error.visible { display: block; }

    .bottom-nav {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      z-index: 50;
      background: rgba(10,15,30,0.92);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border-top: 1px solid var(--border);
      padding: 10px 0 calc(env(safe-area-inset-bottom, 0px) + 10px);
      display: flex;
      justify-content: center;
    }

    .nav-tab {
      flex: 1;
      max-width: 180px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 3px;
      padding: 6px 0;
      text-decoration: none;
      color: var(--muted);
      font-family: 'DM Mono', monospace;
      font-size: 10px;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      transition: color 0.15s;
      -webkit-tap-highlight-color: transparent;
    }

    .nav-tab svg { opacity: 0.5; transition: opacity 0.15s; }
    .nav-tab.active { color: var(--accent); }
    .nav-tab.active svg { opacity: 1; }

    .bp-row {
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      align-items: end;
      gap: 0;
    }

    .bp-sep {
      font-family: 'Syne', sans-serif;
      font-size: 22px;
      font-weight: 700;
      color: var(--muted);
      text-align: center;
      padding: 0 6px 14px;
      line-height: 1;
      opacity: 0.5;
      user-select: none;
    }

    /* tighter left-radius on right input, right-radius on left input
       so they visually pair without gap */
    .bp-row .input-wrap:first-child input {
      border-top-right-radius: 6px;
      border-bottom-right-radius: 6px;
    }

    .bp-row .input-wrap:last-child input {
      border-top-left-radius: 6px;
      border-bottom-left-radius: 6px;
    }

    /* inputs inside bp-row don't need left padding for icon — no icon */
    .bp-row input {
      padding-left: 16px;
      text-align: center;
    }
  </style>
</head>
<body>

<div class="card">
  <div class="header">
    <h1>Vitals</h1>
    <div class="subtitle" id="today-date">—</div>
  </div>

  <div class="fields">

    <div class="field">
      <label>Blood Pressure</label>
      <div class="bp-row">
        <div class="input-wrap">
          <input type="number" id="bp-sys" inputmode="numeric" placeholder="120"
                 min="50" max="300" autocomplete="off" aria-label="Systolic" />
        </div>
        <div class="bp-sep">/</div>
        <div class="input-wrap">
          <input type="number" id="bp-dia" inputmode="numeric" placeholder="80"
                 min="30" max="200" autocomplete="off" aria-label="Diastolic" />
        </div>
      </div>
      <span class="field-error" id="bp-error">Check systolic (50–300) and diastolic (30–200)</span>
    </div>

    <div class="field">
      <label>Heart Rate</label>
      <div class="input-wrap">
        <input type="number" id="hr" inputmode="numeric" placeholder="72" min="30" max="250" autocomplete="off" />
      </div>
      <span class="field-error" id="hr-error">Enter a valid heart rate (30–250 bpm)</span>
    </div>

    <div class="field">
      <label>Weight (lbs)</label>
      <div class="input-wrap">
        <input type="number" id="weight" inputmode="decimal" placeholder="175.0" step="0.1" min="50" max="999" autocomplete="off" />
      </div>
      <span class="field-error" id="weight-error">Enter a valid weight</span>
    </div>

  </div>

  <button id="save-btn" onclick="handleSave()">
    <span class="btn-text">Save Entry</span>
    <span class="btn-spinner"><div class="spinner"></div></span>
  </button>

  <div class="last-saved" id="last-saved"></div>
</div>

<div class="toast" id="toast"></div>

<nav class="bottom-nav">
  <a href="index.html" class="nav-tab active">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/>
    </svg>
    Log
  </a>
  <a href="trends.html" class="nav-tab">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/>
    </svg>
    Trends
  </a>
</nav>

<script>
  // ── CONFIG ──────────────────────────────────────────────────────────────
  // After deploying your Apps Script, paste the URL here:
  const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbyEBFcBeAjhjX7j6B9lvbuB0Hz76lCofssAFzEIdQc27HK3z6fX1sRuIfZkVv928OU/exec';
  // ────────────────────────────────────────────────────────────────────────

  const LS_KEY = 'vitals_last_saved';

  function formatDate(d) {
    return d.toLocaleDateString('en-US', { weekday:'short', month:'short', day:'numeric', year:'numeric' });
  }

  document.getElementById('today-date').textContent = formatDate(new Date());

  // Restore last-saved display
  const ls = localStorage.getItem(LS_KEY);
  if (ls) {
    document.getElementById('last-saved').textContent = `Last saved: ${ls}`;
  }

  function showToast(msg, type = 'success') {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.className = `toast ${type === 'success' ? 'success' : 'error-toast'}`;
    requestAnimationFrame(() => {
      t.classList.add('show');
      setTimeout(() => t.classList.remove('show'), 3000);
    });
  }

  function clearErrors() {
    ['bp-sys','bp-dia','hr','weight'].forEach(id => {
      document.getElementById(id).classList.remove('error');
    });
    ['bp','hr','weight'].forEach(id => {
      document.getElementById(`${id}-error`).classList.remove('visible');
    });
  }

  function setError(id, msg) {
    const el = document.getElementById(id);
    el.classList.add('error');
    // bp-sys and bp-dia share the bp-error element
    const errKey = (id === 'bp-sys' || id === 'bp-dia') ? 'bp' : id;
    const errEl = document.getElementById(`${errKey}-error`);
    if (msg) errEl.textContent = msg;
    errEl.classList.add('visible');
  }

  async function handleSave() {
    clearErrors();

    const sys       = parseInt(document.getElementById('bp-sys').value.trim());
    const dia       = parseInt(document.getElementById('bp-dia').value.trim());
    const hrRaw     = document.getElementById('hr').value.trim();
    const weightRaw = document.getElementById('weight').value.trim();

    let valid = true;

    if (isNaN(sys) || sys < 50 || sys > 300) { setError('bp-sys'); valid = false; }
    if (isNaN(dia) || dia < 30 || dia > 200) { setError('bp-dia'); valid = false; }
    if (!valid) { document.getElementById('bp-error').classList.add('visible'); }

    const hr = parseInt(hrRaw);
    if (!hrRaw || isNaN(hr) || hr < 30 || hr > 250) {
      setError('hr');
      valid = false;
    }

    const weight = parseFloat(weightRaw);
    if (!weightRaw || isNaN(weight) || weight < 50 || weight > 999) {
      setError('weight');
      valid = false;
    }

    if (!valid) return;

    if (!APPS_SCRIPT_URL || APPS_SCRIPT_URL === 'YOUR_APPS_SCRIPT_URL_HERE') {
      showToast('⚠️ Apps Script URL not configured', 'error');
      return;
    }

    const btn = document.getElementById('save-btn');
    btn.classList.add('loading');
    btn.disabled = true;

    const now = new Date();
    const payload = {
      date:   now.toISOString(),
      sys:    sys,
      dia:    dia,
      hr:     hr,
      weight: weight,
    };

    try {
      const res = await fetch(APPS_SCRIPT_URL, {
        method: 'POST',
        body: JSON.stringify(payload),
      });
      const text = await res.text();
      if (res.ok && text.includes('OK')) {
        const ts = formatDate(now) + ' ' + now.toLocaleTimeString('en-US', { hour:'2-digit', minute:'2-digit' });
        localStorage.setItem(LS_KEY, ts);
        document.getElementById('last-saved').textContent = `Last saved: ${ts}`;
        showToast('✓ Saved to sheet', 'success');
        // Clear fields
        ['bp-sys','bp-dia','hr','weight'].forEach(id => document.getElementById(id).value = '');
      } else {
        showToast('Save failed — check console', 'error');
        console.error('Apps Script response:', text);
      }
    } catch (err) {
      showToast('Network error', 'error');
      console.error(err);
    } finally {
      btn.classList.remove('loading');
      btn.disabled = false;
    }
  }

  // Enter/Tab advances fields: sys → dia → hr → weight → save
  const FIELD_ORDER = ['bp-sys', 'bp-dia', 'hr', 'weight'];
  FIELD_ORDER.forEach((id, i) => {
    document.getElementById(id).addEventListener('keydown', e => {
      if (e.key === 'Enter') {
        e.preventDefault();
        if (i < FIELD_ORDER.length - 1) document.getElementById(FIELD_ORDER[i + 1]).focus();
        else handleSave();
      }
    });
  });

  // Auto-advance from sys when 3 digits entered
  document.getElementById('bp-sys').addEventListener('input', e => {
    if (e.target.value.length >= 3) document.getElementById('bp-dia').focus();
  });

  // Register service worker
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('sw.js').catch(console.error);
  }
</script>
</body>
</html>
